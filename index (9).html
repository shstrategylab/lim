<!DOCTYPE html>
<html lang="ko">

  <title>사주풀이</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
      background: #1a0a00;
      color: #f5e6c8;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #f0c060;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #c8a86a;
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, #2d1200 0%, #1a0a00 100%);
      border: 1px solid #6b3a10;
      border-radius: 12px;
      padding: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(200, 100, 0, 0.25);
    }

    .card-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: #f0c060;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #6b3a10;
    }

    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-list li a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #e8d5a8;
      font-size: 0.92rem;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      transition: background 0.15s, color 0.15s;
    }

    .link-list li a:hover {
      background: rgba(240, 192, 96, 0.15);
      color: #f0c060;
    }

    .link-list li a.disabled {
      color: #6b5a3a;
      pointer-events: none;
      cursor: default;
    }

    .icon {
      font-size: 1rem;
      flex-shrink: 0;
    }
  </style>
</head>
