<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박찬수 사주팔자 단계별 풀이</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f5f3ee;
    --card: #ffffff;
    --border: #e2dfd8;
    --border2: #c8c4bb;
    --text: #1c1b18;
    --text2: #5a5754;
    --text3: #9a9690;
    --fire-bg: #fdecea;   --fire: #c0392b;   --fire-dark: #922b21;  --fire-deep: #5b1a14;
    --gold-bg: #fef9ee;   --gold: #b7860b;   --gold-dark: #7d5b07;
    --teal-bg: #e8f8f2;   --teal: #0e7a5a;   --teal-mid: #1aab7c;
    --purple-bg: #f0eefb; --purple: #6c5ce7; --purple-dark: #4a3bbf;
    --amber-bg: #fff8e8;  --amber: #c87a10;  --amber-dark: #7c4c06;
    --red-bg: #fdecea;    --red: #c0392b;    --red-dark: #7b241c;
    --gray-bg: #f0ede8;
    --radius: 12px; --radius-sm: 7px;
    --shadow: 0 2px 8px rgba(0,0,0,.07);
    --shadow-lg: 0 6px 24px rgba(0,0,0,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.75;
    min-height: 100vh;
  }

  .wrap { max-width: 840px; margin: 0 auto; padding: 2rem 1rem 5rem; }

  /* ─── Header ─── */
  header {
    text-align: center;
    margin-bottom: 2.2rem;
    padding-bottom: 1.4rem;
    border-bottom: 1px solid var(--border);
  }
  header .name-tag {
    display: inline-block;
    background: var(--fire);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -.02em;
    color: var(--text);
    margin-bottom: 4px;
  }
  header p { color: var(--text2); font-size: 12.5px; }

  /* ─── Pillars ─── */
  .pillars-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--text3);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .pillars {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .pillar {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 8px 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    box-shadow: var(--shadow);
  }
  .pillar:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: var(--shadow-lg); }
  .pillar.active { border-color: var(--fire); border-width: 2px; box-shadow: 0 0 0 3px var(--fire-bg), var(--shadow-lg); }
  .pillar.active2 { border-color: var(--teal); border-width: 2px; box-shadow: 0 0 0 3px var(--teal-bg), var(--shadow-lg); }

  .p-badge {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 700;
  }
  .badge-me { background: #fad2ce; color: var(--fire-deep); }
  .badge-key { background: #b8ecd8; color: var(--teal); }
  .badge-n { background: var(--gray-bg); color: var(--text3); }

  .p-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .p-kan {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.1;
    margin: 2px 0;
  }
  .p-div { height: 1px; background: var(--border); margin: 5px 10px; }
  .p-ji {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text2);
    line-height: 1.1;
    margin-bottom: 5px;
  }
  .p-jisub { font-size: 10px; color: var(--text3); }
  .p-role { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* fire colors for 火 characters */
  .c-fire { color: var(--fire); }
  .c-water { color: #1a5276; }
  .c-earth { color: var(--gold); }
  .c-metal { color: #5d6d7e; }
  .c-wood { color: #1e8449; }

  /* ─── Progress ─── */
  .progress { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.4rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--fire), #e74c3c); border-radius: 2px; transition: width .4s ease; }

  /* ─── Step nav ─── */
  .step-nav { display: flex; align-items: center; margin-bottom: 1.2rem; }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    color: var(--text3);
    cursor: pointer;
    flex-shrink: 0;
    transition: all .2s;
  }
  .step-dot:hover { border-color: var(--fire); color: var(--fire); }
  .step-dot.done { background: var(--teal); color: #fff; border-color: var(--teal); }
  .step-dot.active { background: var(--fire); color: #fff; border-color: var(--fire); }
  .step-dot.break-dot { background: var(--amber-bg); color: var(--amber-dark); border-color: var(--amber); }
  .step-dot.break-dot.active { background: var(--amber); color: #fff; }
  .step-line { flex: 1; height: 1.5px; background: var(--border); }
  .step-line.done { background: var(--teal); }

  /* ─── Panel ─── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.6rem;
    box-shadow: var(--shadow);
  }
  .panel-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 1.3rem; }
  .panel-num {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--fire-bg);
    color: var(--fire-dark);
    font-size: 15px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Noto Serif KR', serif;
  }
  .panel-num.brk { background: var(--amber-bg); color: var(--amber-dark); }
  .panel-title { font-size: 16px; font-weight: 800; color: var(--text); font-family: 'Noto Serif KR', serif; }
  .panel-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 8px;
    font-weight: 700;
    vertical-align: middle;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tag-basic { background: var(--teal-bg); color: var(--teal); }
  .tag-mid { background: var(--amber-bg); color: var(--amber-dark); }
  .tag-adv { background: var(--red-bg); color: var(--red-dark); }
  .tag-brk { background: var(--amber-bg); color: var(--amber-dark); }

  /* ─── Content elements ─── */
  .why {
    background: var(--fire-bg);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    margin: 13px 0;
    font-size: 13px;
    color: var(--fire-deep);
    line-height: 1.75;
    border-left: 3px solid var(--fire);
  }
  .why strong { color: var(--fire-deep); }

  .ins {
    background: var(--bg);
    border-left: 3px solid var(--fire);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 11px 15px;
    font-size: 13px;
    color: var(--text2);
    margin: 11px 0;
    line-height: 1.75;
  }
  .ins strong { color: var(--text); }
  .ins-green { border-left-color: var(--teal); background: var(--teal-bg); color: #0a5440; }
  .ins-green strong { color: #0a5440; }
  .ins-amber { border-left-color: var(--amber); background: var(--amber-bg); color: var(--amber-dark); }
  .ins-amber strong { color: var(--amber-dark); }
  .ins-red { border-left-color: var(--red); background: var(--red-bg); color: var(--red-dark); }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin: 13px 0; }
  th {
    background: var(--gray-bg);
    padding: 8px 11px;
    text-align: left;
    font-weight: 700;
    color: var(--text2);
    border-bottom: 1.5px solid var(--border);
    font-size: 11.5px;
    letter-spacing: .02em;
  }
  td { padding: 8px 11px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  td:first-child { font-weight: 600; color: var(--text2); }

  tr.hl { background: #fdecea; }
  tr.hl td, tr.hl td:first-child { color: var(--fire-dark); }
  tr.hl-g { background: var(--teal-bg); }
  tr.hl-g td, tr.hl-g td:first-child { color: var(--teal); }
  tr.hl-y { background: var(--amber-bg); }
  tr.hl-y td, tr.hl-y td:first-child { color: var(--amber-dark); }
  tr.hl-r { background: var(--red-bg); }
  tr.hl-r td, tr.hl-r td:first-child { color: var(--red-dark); }
  tr.hl-p { background: var(--purple-bg); }
  tr.hl-p td, tr.hl-p td:first-child { color: var(--purple-dark); }

  .flow { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin: 11px 0; }
  .chip {
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 700;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    white-space: nowrap;
  }
  .chip-r { background: var(--fire-bg); border-color: #f5a49e; color: var(--fire-dark); }
  .chip-g { background: var(--teal-bg); border-color: #5dcaa5; color: var(--teal); }
  .chip-y { background: var(--amber-bg); border-color: #f0c070; color: var(--amber-dark); }
  .chip-p { background: var(--purple-bg); border-color: #a99de0; color: var(--purple-dark); }
  .arrow { font-size: 14px; color: var(--text3); }

  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin: 13px 0; }
  .gi { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; }
  .gi-title { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 5px; }
  .gi-body { font-size: 11.5px; color: var(--text2); line-height: 1.65; }

  .steps-flow { display: flex; flex-direction: column; gap: 11px; margin: 13px 0; }
  .step-item {
    display: flex; gap: 13px;
    padding: 13px 15px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card);
  }
  .step-item.act { border-color: #f5a49e; background: var(--fire-bg); }
  .step-item.act2 { border-color: #5dcaa5; background: var(--teal-bg); }
  .step-n {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--fire-bg);
    color: var(--fire-dark);
    font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-n.g { background: var(--teal-bg); color: var(--teal); }
  .step-t { font-size: 12.5px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .step-d { font-size: 11.5px; color: var(--text2); line-height: 1.65; }

  .brk-box { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 15px; margin: 13px 0; }
  .brk-title { font-size: 13px; font-weight: 800; color: var(--amber-dark); margin-bottom: 11px; }
  .cycle-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 9px 0; }
  .cyc { padding: 6px 11px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 800; text-align: center; min-width: 54px; }
  .cyc-wood { background: #e8f5de; color: #1e6b32; }
  .cyc-fire { background: var(--fire-bg); color: var(--fire-dark); }
  .cyc-earth { background: var(--amber-bg); color: var(--amber-dark); }
  .cyc-metal { background: var(--gray-bg); color: #444; }
  .cyc-water { background: #e4eff9; color: #1a4a7c; }
  .cyc-arr { font-size: 13px; color: var(--text3); }

  /* Matrix */
  .mx th.me { background: var(--fire-bg); color: var(--fire-dark); }
  .mx td.hap { background: var(--teal-bg); color: var(--teal); font-weight: 800; font-size: 11px; }
  .mx td.chung { background: var(--red-bg); color: var(--red-dark); font-weight: 800; font-size: 11px; }
  .mx td.hyung { background: var(--purple-bg); color: var(--purple-dark); font-weight: 800; font-size: 11px; }
  .mx td.none { color: var(--text3); font-size: 11px; text-align: center; }
  .mx td.self { background: var(--gray-bg); color: var(--text3); text-align: center; font-size: 11px; }

  /* Nav */
  .nav-row {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 1.2rem; padding-top: 1.2rem;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    transition: all .15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:hover { border-color: var(--fire); color: var(--fire); background: var(--fire-bg); }
  .btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
  .btn-primary { background: var(--fire-dark); color: #fff; border-color: var(--fire-dark); }
  .btn-primary:hover { background: var(--fire-deep); color: #fff; border-color: var(--fire-deep); }

  @media (max-width: 560px) {
    .pillars { gap: 7px; }
    .p-kan, .p-ji { font-size: 22px; }
    .g2 { grid-template-columns: 1fr; }
    .panel { padding: 1.1rem; }
    .mx { font-size: 10px; }
    .mx th, .mx td { padding: 5px 5px; }
    .panel-title { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="name-tag">박찬수 (남, 1997년 8월 2일 16시 15분)</div>
    <h1>사주팔자 단계별 풀이</h1>
    <p>일간(丙火)을 중심으로 월지 → 일지 → 시주 → 년주 순서로 읽는 완전 해설</p>
  </header>

  <div class="pillars-label">사주 네 기둥 — 丙火 일간 (년주 丁丑 / 월주 丁未 / 일주 丙子 / 시주 丙申)</div>
  <div class="pillars" id="pillars">
    <!-- 시주 -->
    <div class="pillar" data-idx="3" onclick="selP(3)">
      <div class="p-badge badge-n">시주</div>
      <div class="p-label">時</div>
      <div class="p-kan c-fire">丙</div>
      <div class="p-div"></div>
      <div class="p-ji c-metal">申</div>
      <div class="p-jisub">병신</div>
      <div class="p-role">자식·노년·결실</div>
    </div>
    <!-- 일주 ★ -->
    <div class="pillar active" data-idx="2" onclick="selP(2)">
      <div class="p-badge badge-me">일주 ★</div>
      <div class="p-label">日</div>
      <div class="p-kan c-fire">丙</div>
      <div class="p-div"></div>
      <div class="p-ji c-water">子</div>
      <div class="p-jisub">병자</div>
      <div class="p-role">나·배우자·중년</div>
    </div>
    <!-- 월주 -->
    <div class="pillar" data-idx="1" onclick="selP(1)">
      <div class="p-badge badge-key">월주</div>
      <div class="p-label">月</div>
      <div class="p-kan c-fire">丁</div>
      <div class="p-div"></div>
      <div class="p-ji c-earth">未</div>
      <div class="p-jisub">정미</div>
      <div class="p-role">직업·사회·청년기</div>
    </div>
    <!-- 년주 -->
    <div class="pillar" data-idx="0" onclick="selP(0)">
      <div class="p-badge badge-n">년주</div>
      <div class="p-label">年</div>
      <div class="p-kan c-fire">丁</div>
      <div class="p-div"></div>
      <div class="p-ji c-earth">丑</div>
      <div class="p-jisub">정축</div>
      <div class="p-role">조상·어린시절·뿌리</div>
    </div>
  </div>

  <div class="progress"><div class="progress-fill" id="pbar" style="width:12.5%"></div></div>
  <div class="step-nav" id="snav"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const STEPS = [
  // ────────────────────────────────────────────────────────────
  // 1단계
  // ────────────────────────────────────────────────────────────
  {
    title: "1단계 — 일간(日干) 확인",
    sub: "나는 무엇인가? 60갑자에서 어떻게 찾는가?",
    tag: "basic", focus: [2], isBreak: false,
    html: `
<div class="why"><strong>왜 일간이 기준점인가?</strong><br>
사주 8글자 중 '나 자신'은 일간(日干) 단 하나입니다. 나머지 7글자는 모두 "이 일간과 어떤 오행 관계인가"로 해석됩니다. 같은 甲(갑목)이라도 내 일간이 火이면 인성(학문·귀인), 土이면 식상(재능 발휘)이 됩니다.</div>
<div class="ins"><strong>60갑자에서 일간 찾는 법:</strong> 천간 10개 × 지지 12개를 순서대로 짝지으면 60쌍이 생깁니다. 甲子(1번) → 乙丑(2번) → … → 丙子(13번) → … 만세력 앱에 생년월일시를 입력하면 태어난 날이 자동 계산되어 일주(일간+일지)가 나옵니다.<br><br>
<strong>丙子가 13번째인 이유:</strong> 천간에서 丙은 3번째, 지지에서 子는 1번째. 甲子(1번)에서 시작해 → 甲(1,3,5,7,9)·乙(2,4,6,8,10)·丙(3,5,7,9,11)… 순으로 짝지으면 <strong>13번째 丙子</strong>에 도달합니다.</div>
<table>
<thead><tr><th>일간</th><th>오행</th><th>음양</th><th>상징</th><th>핵심 기질</th></tr></thead>
<tbody>
<tr><td>甲 갑</td><td>木</td><td>양</td><td>큰 나무</td><td>추진력·리더십</td></tr>
<tr><td>乙 을</td><td>木</td><td>음</td><td>덩굴·풀</td><td>유연·적응력</td></tr>
<tr class="hl"><td>丙 병 ★</td><td>火</td><td>양</td><td>태양·큰불</td><td>열정·외향성·밝음</td></tr>
<tr><td>丁 정</td><td>Fire</td><td>음</td><td>촛불·등불</td><td>섬세·집중·정밀함</td></tr>
<tr><td>戊 무</td><td>土</td><td>양</td><td>큰 산</td><td>안정·포용</td></tr>
<tr><td>己 기</td><td>土</td><td>음</td><td>논밭</td><td>실용·세밀</td></tr>
<tr><td>庚 경</td><td>金</td><td>양</td><td>강한 쇠</td><td>의지·결단</td></tr>
<tr><td>辛 신</td><td>金</td><td>음</td><td>보석·칼</td><td>완성미·예민함</td></tr>
<tr><td>壬 임</td><td>水</td><td>양</td><td>큰 바다</td><td>지혜·포용</td></tr>

let cur = 0;

function renderNav() {
  const nav = document.getElementById('snav');
  nav.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= cur ? ' done' : '');
      nav.appendChild(line);
    }
    const dot = document.createElement('div');
    const isB = s.isBreak;
    const label = isB ? '☕' : (i === 0 ? '1' : i === 1 ? '2' : i === 2 ? '✦' : i);
    dot.className = 'step-dot' + (isB ? ' break-dot' : '') + (i === cur ? ' active' : i < cur ? ' done' : '');
    dot.textContent = label;
    dot.title = s.title;
    dot.onclick = () => go(i);
    nav.appendChild(dot);
  });
  document.getElementById('pbar').style.width = ((cur + 1) / STEPS.length * 100) + '%';
}

function renderPanel() {
  const s = STEPS[cur];
  const tagMap = { basic: ['기초', 'tag-basic'], mid: ['중급', 'tag-mid'], adv: ['심화', 'tag-adv'], brk: ['쉬어가기', 'tag-brk'] };
  const [tl, tc] = tagMap[s.tag];
  const numLabel = s.isBreak ? '☕' : (cur === 0 ? '1' : cur === 1 ? '2' : cur === 2 ? '✦' : cur);
  const nc = s.isBreak ? 'panel-num brk' : 'panel-num';
  document.getElementById('panel').innerHTML = `
    <div class="panel-header">
      <div class="${nc}">${numLabel}</div>
      <div>
        <div class="panel-title">${s.title} <span class="tag ${tc}">${tl}</span></div>
        <div class="panel-sub">${s.sub}</div>
      </div>
    </div>
    <div>${s.html}</div>
    <div class="nav-row">
      <button class="btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>← 이전</button>
      <button class="btn btn-primary" onclick="go(${cur+1})" ${cur===STEPS.length-1?'disabled':''}>${cur===STEPS.length-1?'완료 ✓':'다음 단계 →'}</button>
    </div>`;

  document.querySelectorAll('.pillar').forEach(p => p.classList.remove('active','active2'));
  s.focus.forEach(i => {
    const p = document.querySelector(`.pillar[data-idx="${i}"]`);
    if (p) p.classList.add(i === 2 ? 'active' : 'active2');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(i) {
  if (i < 0 || i >= STEPS.length) return;
  cur = i;
  renderNav();
  renderPanel();
}

function selP(i) {
  const m = { 2: 0, 1: 1, 0: 5, 3: 4 };
  go(m[i] ?? 0);
}

go(0);
