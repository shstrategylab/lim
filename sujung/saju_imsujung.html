<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주팔자 단계별 풀이 — 임수정 戊戌 일주</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --border: #e6e2d8;
    --border2: #cdc8ba;
    --text: #1c1a14;
    --text2: #5c5848;
    --text3: #9c9888;
    --amber: #b07820;
    --amber-dark: #7a5010;
    --amber-bg: #fdf3dc;
    --amber-light: #fef8ec;
    --teal: #0d6b52;
    --teal-mid: #1a9a72;
    --teal-bg: #e0f5ec;
    --red: #a03018;
    --red-dark: #782210;
    --red-bg: #faeae4;
    --gray-bg: #f0ede4;
    --gold: #c89820;
    --gold-bg: #fdf6e0;
    --radius: 12px;
    --radius-sm: 7px;
    --shadow: 0 2px 8px rgba(0,0,0,.07);
    --shadow-lg: 0 4px 20px rgba(0,0,0,.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.75;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .wrap { max-width: 840px; margin: 0 auto; padding: 2rem 1rem 5rem; }

  header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1.8rem 1.5rem 1.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '土';
    position: absolute;
    right: -10px; top: -10px;
    font-size: 110px;
    font-family: 'Noto Serif KR', serif;
    font-weight: 900;
    color: rgba(176,120,32,.06);
    line-height: 1;
    pointer-events: none;
  }
  .hdr-badge {
    display: inline-block;
    background: var(--amber-bg);
    color: var(--amber-dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid #e8c870;
    margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--text);
    margin-bottom: 6px;
  }
  header p { color: var(--text2); font-size: 13px; }

  /* ── PILLARS ── */
  .pillars-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    margin-top: 1.8rem;
  }
  .pillars {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .pillar {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 8px 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: transform .18s, border-color .18s, box-shadow .18s;
  }
  .pillar:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .pillar.active {
    border-color: var(--amber);
    border-width: 2px;
    box-shadow: 0 0 0 3px var(--amber-bg), var(--shadow);
  }
  .pillar.active2 {
    border-color: var(--teal);
    border-width: 2px;
    box-shadow: 0 0 0 3px var(--teal-bg), var(--shadow);
  }
  .p-badge {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 700;
  }
  .badge-me { background: #fce8b0; color: var(--amber-dark); border: 1px solid #e8c060; }
  .badge-key { background: #c0edd8; color: var(--teal); border: 1px solid #70c8a0; }
  .badge-n { background: var(--gray-bg); color: var(--text3); border: 1px solid var(--border2); }
  .p-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
  .p-kan {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.1;
    margin: 2px 0;
    color: var(--text);
  }
  .p-div { height: 1px; background: var(--border); margin: 5px 10px; }
  .p-ji {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text2);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .p-role { font-size: 10px; color: var(--text3); }

  /* pillar earth color */
  .pillar.active .p-kan { color: var(--amber-dark); }

  /* ── PROGRESS ── */
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.2rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--gold));
    border-radius: 2px;
    transition: width .35s ease;
  }

  /* ── STEP NAV ── */
  .step-nav {
    display: flex;
    align-items: center;
    margin-bottom: 1.2rem;
    gap: 0;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    color: var(--text3);
    cursor: pointer;
    flex-shrink: 0;
    transition: all .2s;
  }
  .step-dot:hover { border-color: var(--amber); color: var(--amber); }
  .step-dot.done { background: var(--teal); color: #fff; border-color: var(--teal); }
  .step-dot.active { background: var(--amber-dark); color: #fff; border-color: var(--amber-dark); }
  .step-dot.break-dot { background: var(--amber-bg); color: var(--amber-dark); border-color: var(--amber); }
  .step-dot.break-dot.active { background: var(--amber); color: #fff; }
  .step-line { flex: 1; height: 1.5px; background: var(--border); }
  .step-line.done { background: var(--teal); }

  /* ── PANEL ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.8rem;
    box-shadow: var(--shadow);
  }
  .panel-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 1.4rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .panel-num {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--amber-bg);
    color: var(--amber-dark);
    font-size: 15px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid #e8c070;
  }
  .panel-num.brk { background: var(--amber-bg); color: var(--amber-dark); }
  .panel-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }
  .panel-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 8px;
    font-weight: 700;
    vertical-align: middle;
  }
  .tag-basic { background: var(--teal-bg); color: var(--teal); }
  .tag-mid { background: var(--amber-bg); color: var(--amber-dark); }
  .tag-adv { background: var(--red-bg); color: var(--red-dark); }
  .tag-brk { background: var(--gold-bg); color: var(--gold); }

  /* ── CONTENT ELEMENTS ── */
  .why {
    background: var(--amber-bg);
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 13px 16px;
    margin: 12px 0;
    font-size: 13px;
    color: var(--amber-dark);
    line-height: 1.8;
  }
  .why strong { color: var(--amber-dark); }

  .ins {
    background: var(--bg);
    border-left: 3px solid var(--border2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 11px 15px;
    font-size: 13px;
    color: var(--text2);
    margin: 10px 0;
    line-height: 1.8;
  }
  .ins strong { color: var(--text); }
  .ins-green { border-left-color: var(--teal); background: var(--teal-bg); color: #0a5040; }
  .ins-amber { border-left-color: var(--amber); background: var(--amber-light); }
  .ins-red { border-left-color: var(--red); background: var(--red-bg); color: var(--red-dark); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
  th {
    background: var(--gray-bg);
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    color: var(--text2);
    border-bottom: 1.5px solid var(--border2);
    font-size: 11px;
  }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  td:first-child { font-weight: 600; color: var(--text2); }
  tr.hl { background: var(--amber-light); }
  tr.hl td, tr.hl td:first-child { color: var(--amber-dark); }
  tr.hl-g { background: var(--teal-bg); }
  tr.hl-g td, tr.hl-g td:first-child { color: var(--teal); }
  tr.hl-y { background: var(--gold-bg); }
  tr.hl-y td, tr.hl-y td:first-child { color: #8a6010; }
  tr.hl-r { background: var(--red-bg); }
  tr.hl-r td, tr.hl-r td:first-child { color: var(--red-dark); }

  .flow { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin: 10px 0; }
  .chip {
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    white-space: nowrap;
  }
  .chip-a { background: var(--amber-bg); border-color: #e8c070; color: var(--amber-dark); }
  .chip-g { background: var(--teal-bg); border-color: #70c8a0; color: var(--teal); }
  .chip-r { background: var(--red-bg); border-color: #f0a080; color: var(--red-dark); }
  .chip-y { background: var(--gold-bg); border-color: #d8b050; color: #7a5010; }
  .arrow { font-size: 14px; color: var(--text3); }

  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .gi {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    background: var(--card);
  }
  .gi-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .gi-body { font-size: 11px; color: var(--text2); line-height: 1.7; }

  .steps-flow { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
  .step-item {
    display: flex; gap: 13px;
    padding: 13px 15px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card);
  }
  .step-item.act { border-color: #e8c070; background: var(--amber-light); }
  .step-item.act2 { border-color: #70c8a0; background: var(--teal-bg); }
  .step-n {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--amber-bg);
    color: var(--amber-dark);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid #e8c070;
  }
  .step-n.g { background: var(--teal-bg); color: var(--teal); border-color: #70c8a0; }
  .step-t { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .step-d { font-size: 11px; color: var(--text2); line-height: 1.7; }

  .brk-box {
    background: var(--gray-bg);
    border-radius: var(--radius-sm);
    padding: 15px;
    margin: 12px 0;
    border: 1px solid var(--border);
  }
  .brk-title { font-size: 13px; font-weight: 700; color: var(--amber-dark); margin-bottom: 10px; }
  .cycle-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .cyc {
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 700;
    text-align: center; min-width: 54px;
    font-family: 'Noto Serif KR', serif;
  }
  .cyc-wood { background: #eaf3de; color: #285010; }
  .cyc-fire { background: var(--red-bg); color: var(--red-dark); }
  .cyc-earth { background: var(--amber-bg); color: var(--amber-dark); }
  .cyc-metal { background: var(--gray-bg); color: #444440; border: 1px solid #ccc; }
  .cyc-water { background: #e4f0fc; color: #0c4480; }
  .cyc-arr { font-size: 13px; color: var(--text3); }

  /* Matrix table */
  .mx th.me { background: var(--amber-bg); color: var(--amber-dark); }
  .mx td.hap { background: var(--teal-bg); color: var(--teal); font-weight: 700; font-size: 11px; }
  .mx td.chung { background: var(--red-bg); color: var(--red-dark); font-weight: 700; font-size: 11px; }
  .mx td.hyung { background: #fce8f0; color: #a0186c; font-weight: 700; font-size: 11px; }
  .mx td.none { color: var(--text3); font-size: 11px; text-align: center; }
  .mx td.self { background: var(--gray-bg); color: var(--text3); text-align: center; font-size: 11px; }

  .nav-row {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 1.2rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    transition: all .15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
  .btn-primary { background: var(--amber-dark); color: #fff; border-color: var(--amber-dark); }
  .btn-primary:hover { background: #5c3c08; color: #fff; border-color: #5c3c08; }

  .sep { height: 1px; background: var(--border); margin: 14px 0; }

  @media (max-width: 560px) {
    .pillars { gap: 6px; }
    .p-kan, .p-ji { font-size: 22px; }
    .g2 { grid-template-columns: 1fr; }
    .panel { padding: 1.1rem; }
    .mx { font-size: 10px; }
    .mx th, .mx td { padding: 4px 5px; }
    .step-dot { width: 26px; height: 26px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="hdr-badge">女命 · 사주팔자 단계별 풀이</div>
    <h1>임수정 — 戊戌 일주</h1>
    <p>2007년 1월 4일 10시 30분생 · 일간을 중심으로 월지 → 일지 → 시주 → 년주 순서로 읽는 완전 해설</p>
  </header>

  <div class="pillars-label">사주 사기둥 — 시주·일주·월주·년주</div>
  <div class="pillars" id="pillars">
    <div class="pillar" data-idx="3" onclick="selP(3)">
      <div class="p-badge badge-n">시주</div>
      <div class="p-label">時</div>
      <div class="p-kan">丁</div>
      <div class="p-div"></div>
      <div class="p-ji">巳</div>
      <div class="p-role">자식·노년·결실</div>
    </div>
    <div class="pillar active" data-idx="2" onclick="selP(2)">
      <div class="p-badge badge-me">일주 ★</div>
      <div class="p-label">日</div>
      <div class="p-kan">戊</div>
      <div class="p-div"></div>
      <div class="p-ji">戌</div>
      <div class="p-role">나·배우자·중년</div>
    </div>
    <div class="pillar" data-idx="1" onclick="selP(1)">
      <div class="p-badge badge-key">월주</div>
      <div class="p-label">月</div>
      <div class="p-kan">庚</div>
      <div class="p-div"></div>
      <div class="p-ji" style="color:var(--teal)">子</div>
      <div class="p-role">직업·사회·청년기</div>
    </div>
    <div class="pillar" data-idx="0" onclick="selP(0)">
      <div class="p-badge badge-n">년주</div>
      <div class="p-label">年</div>
      <div class="p-kan">丙</div>
      <div class="p-div"></div>
      <div class="p-ji">戌</div>
      <div class="p-role">조상·어린시절·뿌리</div>
    </div>
  </div>

  <div class="progress"><div class="progress-fill" id="pbar" style="width:12.5%"></div></div>
  <div class="step-nav" id="snav"></div>
  <div class="panel" id="panel"></div>

</div>

<script>
const STEPS = [
  /* ─────────── 1단계 ─────────── */
  {
    title: "1단계 — 일간(日干) 확인",
    sub: "나는 무엇인가? 60갑자에서 어떻게 찾는가?",
    tag: "basic", focus: [2], isBreak: false,
    html: `
<div class="why"><strong>왜 일간이 기준점인가?</strong><br>
사주 8글자 중 '나 자신'은 일간(日干) 단 하나입니다. 나머지 7글자는 모두 "이 일간과 어떤 오행 관계인가"로 해석됩니다. 같은 丁(정화)이라도 내 일간이 土이면 식상(재능), 木이면 정인(귀인)이 됩니다.</div>
<div class="ins ins-amber"><strong>60갑자에서 일간 찾는 법:</strong> 천간 10개 × 지지 12개를 순서대로 짝지으면 60쌍이 생깁니다. 甲子(1번) → 乙丑(2번) → … → 戊戌(35번) → … → 癸亥(60번). 만세력 앱에 생년월일시를 입력하면 태어난 날이 자동 계산되어 일주(일간+일지)가 나옵니다.<br><br>
<strong>戊戌이 35번째인 이유:</strong> 천간에서 戊는 5번째, 지지에서 戌는 11번째. 甲子(1번)에서 출발해 짝을 맞추면 → 31번(甲辰)부터 세어 戊辰=5번, 戊申=17번, 戊子=25번, 戊辰=35번? 정확히는 甲子를 1로 잡으면 <strong>35번 戊戌</strong>에 도달합니다. (천간 5×7사이클 원리)</div>
<table>
<thead><tr><th>일간</th><th>오행</th><th>음양</th><th>상징</th><th>핵심 기질</th></tr></thead>
<tbody>
<tr><td>甲 갑</td><td>木</td><td>양</td><td>큰 나무</td><td>추진력·리더십</td></tr>
<tr><td>乙 을</td><td>木</td><td>음</td><td>덩굴·풀</td><td>유연·적응력</td></tr>
<tr><td>丙 병</td><td>火</td><td>양</td><td>태양</td><td>열정·외향성</td></tr>
<tr><td>丁 정</td><td>Fire</td><td>음</td><td>촛불</td><td>섬세·집중력</td></tr>
<tr class="hl"><td>戊 무 ★</td><td>土</td><td>양</td><td>큰 산·댐</td><td>안정·포용·지도력</td></tr>
<tr><td>己 기</td><td>土</td><td>음</td><td>논밭</td><td>실용·세밀</td></tr>
<tr><td>庚 경</td><td>金</td><td>양</td><td>강한 쇠</td><td>의지·결단</td></tr>
<tr><td>辛 신</td><td>金</td><td>음</td><td>보석·칼</td><td>완성미·예민함</td></tr>

let cur = 0;

function renderNav() {
  const nav = document.getElementById('snav');
  nav.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= cur ? ' done' : '');
      nav.appendChild(line);
    }
    const dot = document.createElement('div');
    const isB = s.isBreak;
    let label;
    if (isB) label = '☕';
    else if (i === 0) label = '1';
    else if (i === 1) label = '2';
    else if (i === 2) label = '✦';
    else if (i <= 6) label = i;
    else if (i === 7) label = '日';
    else if (i === 8) label = '殺';
    else if (i === 9) label = '用';
    else label = '運';
    dot.className = 'step-dot' + (isB ? ' break-dot' : '') + (i === cur ? ' active' : i < cur ? ' done' : '');
    dot.textContent = label;
    dot.title = s.title;
    dot.onclick = () => go(i);
    nav.appendChild(dot);
  });
  document.getElementById('pbar').style.width = ((cur + 1) / STEPS.length * 100) + '%';
}

function renderPanel() {
  const s = STEPS[cur];
  const tagMap = {
    basic: ['기초', 'tag-basic'],
    mid: ['중급', 'tag-mid'],
    adv: ['심화', 'tag-adv'],
    brk: ['쉬어가기', 'tag-brk']
  };
  const [tl, tc] = tagMap[s.tag];
  let numLabel;
  if (s.isBreak) numLabel = '☕';
  else if (cur === 0) numLabel = '1';
  else if (cur === 1) numLabel = '2';
  else if (cur === 2) numLabel = '✦';
  else if (cur <= 6) numLabel = cur;
  else if (cur === 7) numLabel = '日';
  else if (cur === 8) numLabel = '殺';
  else if (cur === 9) numLabel = '用';
  else numLabel = '運';

  const nc = s.isBreak ? 'panel-num brk' : 'panel-num';
  const prevLabel = cur === 0 ? '← 이전' : '← 이전';
  const nextLabel = cur === STEPS.length - 1 ? '완료 ✓' : '다음 단계 →';

  document.getElementById('panel').innerHTML = `
    <div class="panel-header">
      <div class="${nc}">${numLabel}</div>
      <div>
        <div class="panel-title">${s.title} <span class="tag ${tc}">${tl}</span></div>
        <div class="panel-sub">${s.sub}</div>
      </div>
    </div>
    <div>${s.html}</div>
    <div class="nav-row">
      <button class="btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>${prevLabel}</button>
      <button class="btn btn-primary" onclick="go(${cur+1})" ${cur===STEPS.length-1?'disabled':''}>${nextLabel}</button>
    </div>`;

  document.querySelectorAll('.pillar').forEach(p => p.classList.remove('active','active2'));
  s.focus.forEach(i => {
    const p = document.querySelector(`.pillar[data-idx="${i}"]`);
    if (p) p.classList.add(i === 2 ? 'active' : 'active2');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(i) {
  if (i < 0 || i >= STEPS.length) return;
  cur = i;
  renderNav();
  renderPanel();
}

function selP(i) {
  // 2(일주)→0(1단계), 1(월주)→1(2단계), 0(년주)→6(7단계), 3(시주)→4(4단계)
  const m = { 2: 0, 1: 1, 0: 6, 3: 4 };
  go(m[i] ?? 0);
}

go(0);
