<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주팔자 단계별 풀이 가이드</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #e4e2dc;
    --border2: #ccc9c0;
    --text: #1a1a18;
    --text2: #5a5956;
    --text3: #9a9890;
    --purple-bg: #eeedfe; --purple: #534AB7; --purple-dark: #3C3489; --purple-deep: #26215C;
    --teal-bg: #e1f5ee; --teal: #0F6E56; --teal-mid: #1D9E75;
    --amber-bg: #faeeda; --amber: #BA7517; --amber-dark: #633806;
    --red-bg: #faece7; --red: #993C1D; --red-dark: #712B13;
    --gray-bg: #f1efe8;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.7; min-height: 100vh; }

  /* Layout */
  .wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; color: var(--text); margin-bottom: 6px; }
  header p { color: var(--text2); font-size: 13px; }

  /* Pillars */
  .pillars-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .pillars { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .pillar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px 10px; text-align: center; cursor: pointer; position: relative; transition: transform .15s, border-color .15s, box-shadow .15s; }
  .pillar:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: var(--shadow); }
  .pillar.active { border-color: var(--purple); border-width: 1.5px; box-shadow: 0 0 0 3px var(--purple-bg); }
  .pillar.active2 { border-color: var(--teal); border-width: 1.5px; box-shadow: 0 0 0 3px var(--teal-bg); }
  .p-badge { position: absolute; top: -9px; left: 50%; transform: translateX(-50%); font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
  .badge-me { background: #cecbf6; color: var(--purple-deep); }
  .badge-key { background: #9fe1cb; color: var(--teal); }
  .badge-n { background: var(--gray-bg); color: var(--text3); }
  .p-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
  .p-kan { font-size: 26px; font-weight: 700; line-height: 1.1; margin: 2px 0; }
  .p-div { height: 1px; background: var(--border); margin: 4px 8px; }
  .p-ji { font-size: 26px; font-weight: 600; color: var(--text2); line-height: 1.1; margin-bottom: 4px; }
  .p-role { font-size: 10px; color: var(--text3); }

  /* Step nav */
  .step-nav { display: flex; align-items: center; margin-bottom: 1.2rem; }
  .step-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: var(--bg); color: var(--text3); cursor: pointer; flex-shrink: 0; transition: all .2s; }
  .step-dot:hover { border-color: var(--purple); color: var(--purple); }
  .step-dot.done { background: var(--teal); color: #fff; border-color: var(--teal); }
  .step-dot.active { background: var(--purple-dark); color: #fff; border-color: var(--purple-dark); }
  .step-dot.break-dot { background: var(--amber-bg); color: var(--amber-dark); border-color: var(--amber); }
  .step-dot.break-dot.active { background: var(--amber); color: #fff; }
  .step-line { flex: 1; height: 1px; background: var(--border); }
  .step-line.done { background: var(--teal); }

  /* Panel */
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .panel-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 1.2rem; }
  .panel-num { width: 36px; height: 36px; border-radius: 50%; background: var(--purple-bg); color: var(--purple-dark); font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .panel-num.brk { background: var(--amber-bg); color: var(--amber-dark); }
  .panel-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .panel-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; font-weight: 600; vertical-align: middle; }
  .tag-basic { background: var(--teal-bg); color: var(--teal); }
  .tag-mid { background: var(--amber-bg); color: var(--amber-dark); }
  .tag-adv { background: var(--red-bg); color: var(--red-dark); }
  .tag-brk { background: var(--amber-bg); color: var(--amber-dark); }

  /* Content elements */
  .why { background: var(--purple-bg); border-radius: var(--radius-sm); padding: 12px 14px; margin: 12px 0; font-size: 13px; color: var(--purple-deep); line-height: 1.7; }
  .why strong { color: var(--purple-deep); }
  .ins { background: var(--bg); border-left: 3px solid var(--purple); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 14px; font-size: 13px; color: var(--text2); margin: 10px 0; line-height: 1.7; }
  .ins strong { color: var(--text); }
  .ins-green { border-left-color: var(--teal); }
  .ins-amber { border-left-color: var(--amber); }
  .ins-red { border-left-color: var(--red); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
  th { background: var(--gray-bg); padding: 7px 10px; text-align: left; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  td:first-child { font-weight: 600; color: var(--text2); }
  tr.hl { background: #f5f4ff; } tr.hl td, tr.hl td:first-child { color: var(--purple-dark); }
  tr.hl-g { background: #edfaf4; } tr.hl-g td, tr.hl-g td:first-child { color: var(--teal); }
  tr.hl-y { background: #fef8ec; } tr.hl-y td, tr.hl-y td:first-child { color: var(--amber-dark); }
  tr.hl-r { background: #fdf1ed; } tr.hl-r td, tr.hl-r td:first-child { color: var(--red-dark); }

  .flow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
  .chip { padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--bg); color: var(--text2); white-space: nowrap; }
  .chip-p { background: var(--purple-bg); border-color: #afa9ec; color: var(--purple-dark); }
  .chip-g { background: var(--teal-bg); border-color: #5dcaa5; color: var(--teal); }
  .chip-r { background: var(--red-bg); border-color: #f0997b; color: var(--red-dark); }
  .chip-y { background: var(--amber-bg); border-color: #fac775; color: var(--amber-dark); }
  .arrow { font-size: 14px; color: var(--text3); }

  /* Grid 2col */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .gi { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .gi-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .gi-body { font-size: 11px; color: var(--text2); line-height: 1.6; }

  /* Steps flow */
  .steps-flow { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
  .step-item { display: flex; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); }
  .step-item.act { border-color: #afa9ec; background: var(--purple-bg); }
  .step-item.act2 { border-color: #5dcaa5; background: var(--teal-bg); }
  .step-n { width: 24px; height: 24px; border-radius: 50%; background: var(--purple-bg); color: var(--purple-dark); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-n.g { background: var(--teal-bg); color: var(--teal); }
  .step-t { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .step-d { font-size: 11px; color: var(--text2); line-height: 1.6; }

  /* Break section */
  .brk-box { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 14px; margin: 12px 0; }
  .brk-title { font-size: 13px; font-weight: 700; color: var(--amber-dark); margin-bottom: 10px; }
  .cycle-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin: 8px 0; }
  .cyc { padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; text-align: center; min-width: 52px; }
  .cyc-wood { background: #eaf3de; color: #27500a; }
  .cyc-fire { background: var(--red-bg); color: var(--red-dark); }
  .cyc-earth { background: var(--amber-bg); color: var(--amber-dark); }
  .cyc-metal { background: var(--gray-bg); color: #444441; }
  .cyc-water { background: #e6f1fb; color: #0c447c; }
  .cyc-arr { font-size: 13px; color: var(--text3); }

  /* Matrix table */
  .mx th.me { background: var(--purple-bg); color: var(--purple-dark); }
  .mx td.hap { background: var(--teal-bg); color: var(--teal); font-weight: 700; font-size: 11px; }
  .mx td.chung { background: var(--red-bg); color: var(--red-dark); font-weight: 700; font-size: 11px; }
  .mx td.none { color: var(--text3); font-size: 11px; text-align: center; }
  .mx td.self { background: var(--gray-bg); color: var(--text3); text-align: center; font-size: 11px; }

  /* Nav buttons */
  .nav-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .btn { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text); transition: all .15s; }
  .btn:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-bg); }
  .btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
  .btn-primary { background: var(--purple-dark); color: #fff; border-color: var(--purple-dark); }
  .btn-primary:hover { background: var(--purple-deep); color: #fff; }

  /* Progress bar */
  .progress { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 2px; transition: width .3s; }

  @media (max-width: 540px) {
    .pillars { gap: 6px; }
    .p-kan, .p-ji { font-size: 20px; }
    .g2 { grid-template-columns: 1fr; }
    .panel { padding: 1rem; }
    .mx { font-size: 10px; }
    .mx th, .mx td { padding: 4px 5px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>사주팔자 단계별 풀이 가이드</h1>
    <p>일간을 중심으로 월지 → 일지 → 시주 → 년주 순서로 읽는 초보자 완전 해설</p>
  </header>

  <div class="pillars-label">예시 사주 — 辛금 일간 (년주 乙卯 / 월주 甲申 / 일주 辛亥 / 시주 己丑)</div>
  <div class="pillars" id="pillars">
    <div class="pillar" data-idx="3" onclick="selP(3)">
      <div class="p-badge badge-n">시주</div>
      <div class="p-label">時</div>
      <div class="p-kan">己</div>
      <div class="p-div"></div>
      <div class="p-ji">丑</div>
      <div class="p-role">자식·노년·결실</div>
    </div>
    <div class="pillar active" data-idx="2" onclick="selP(2)">
      <div class="p-badge badge-me">일주 ★</div>
      <div class="p-label">日</div>
      <div class="p-kan" style="color:var(--purple-dark)">辛</div>
      <div class="p-div"></div>
      <div class="p-ji">亥</div>
      <div class="p-role">나·배우자·중년</div>
    </div>
    <div class="pillar" data-idx="1" onclick="selP(1)">
      <div class="p-badge badge-key">월주</div>
      <div class="p-label">月</div>
      <div class="p-kan">甲</div>
      <div class="p-div"></div>
      <div class="p-ji" style="color:var(--teal)">申</div>
      <div class="p-role">직업·사회·청년기</div>
    </div>
    <div class="pillar" data-idx="0" onclick="selP(0)">
      <div class="p-badge badge-n">년주</div>
      <div class="p-label">年</div>
      <div class="p-kan">乙</div>
      <div class="p-div"></div>
      <div class="p-ji">卯</div>
      <div class="p-role">조상·어린시절·뿌리</div>
    </div>
  </div>

  <div class="progress"><div class="progress-fill" id="pbar" style="width:12.5%"></div></div>
  <div class="step-nav" id="snav"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const STEPS = [
  {
    title: "1단계 — 일간(日干) 확인",
    sub: "나는 무엇인가? 60갑자에서 어떻게 찾는가?",
    tag: "basic", focus: [2], isBreak: false,
    html: `
<div class="why"><strong>왜 일간이 기준점인가?</strong><br>
사주 8글자 중 '나 자신'은 일간(日干) 단 하나입니다. 나머지 7글자는 모두 "이 일간과 어떤 오행 관계인가"로 해석됩니다. 같은 甲(갑목)이라도 내 일간이 金이면 재성(돈), 水이면 식상(재능)이 됩니다.</div>
<div class="ins"><strong>60갑자에서 일간 찾는 법:</strong> 천간 10개 × 지지 12개를 순서대로 짝지으면 60쌍이 생깁니다. 甲子(1번) → 乙丑(2번) → … → 辛亥(48번) → … → 癸亥(60번). 만세력 앱에 생년월일시를 입력하면 태어난 날이 자동 계산되어 일주(일간+일지)가 나옵니다.<br><br>
<strong>辛亥가 48번째인 이유:</strong> 천간에서 辛은 8번째, 지지에서 亥는 12번째. 甲子(1번)에서 출발해 하나씩 밀어가면 41번(甲辰) → 42 → 43 → 44 → 45 → 46 → 47 → <strong>48번 辛亥</strong>에 도달합니다.</div>
<table>
<thead><tr><th>일간</th><th>오행</th><th>음양</th><th>상징</th><th>핵심 기질</th></tr></thead>
<tbody>
<tr><td>甲 갑</td><td>木</td><td>양</td><td>큰 나무</td><td>추진력·리더십</td></tr>
<tr><td>乙 을</td><td>木</td><td>음</td><td>덩굴·풀</td><td>유연·적응력</td></tr>
<tr><td>丙 병</td><td>火</td><td>양</td><td>태양</td><td>열정·외향성</td></tr>
<tr><td>丁 정</td><td>火</td><td>음</td><td>촛불</td><td>섬세·집중력</td></tr>
<tr><td>戊 무</td><td>土</td><td>양</td><td>큰 산</td><td>안정·포용</td></tr>
<tr><td>己 기</td><td>土</td><td>음</td><td>논밭</td><td>실용·세밀</td></tr>
<tr><td>庚 경</td><td>金</td><td>양</td><td>강한 쇠</td><td>의지·결단</td></tr>
<tr class="hl"><td>辛 신 ★</td><td>金</td><td>음</td><td>보석·칼</td><td>완성미·예민함</td></tr>
<tr><td>壬 임</td><td>水</td><td>양</td><td>큰 바다</td><td>지혜·포용</td></tr>
<tr><td>癸 계</td><td>Water</td><td>음</td><td>빗물·이슬</td><td>직관·감수성</td></tr>
</tbody></table>
<div class="ins ins-green"><strong>예시:</strong> 태어난 날이 辛亥(48번째)이므로 일간 = <strong>辛(신금)</strong>. "보석·칼날처럼 완성미와 예민함을 추구하는 음금(陰金)"이 내 기본 기질입니다. 辛亥 일주는 60갑자 중 '금수상함(金水相涵)'의 형상으로 가장 영특하고 냉철한 사리 분별력을 가진다고 봅니다.</div>`
  },
  {
    title: "2단계 — 월지(月支) 대조",
    sub: "어느 계절에 태어났는가? 절기 기준으로 득령을 판단한다",
    tag: "basic", focus: [1], isBreak: false,
    html: `
<div class="why"><strong>왜 풀이 순서 2번이 월지인가?</strong><br>
월지는 8글자 중 가장 강한 에너지입니다. 계절의 기운이 한 달 내내 지속되기 때문입니다. 신강·신약 판단의 약 50%를 월지 하나가 결정하며, "내가 어떤 환경에서 자랐는가"를 뜻합니다.</div>
<div class="ins ins-amber"><strong>절기(節氣) 기준입니다.</strong> 음력도 양력도 아닌 태양의 위치(절기)를 씁니다. 만세력 앱이 자동 계산해 줍니다.<br><br>
<strong>왜 인(寅)월이 1월인가?</strong> 새벽 3~5시(인시)에 동이 트듯, 인(寅)월에 땅속 생명 기운이 처음 밖으로 솟구칩니다. 자(子)월은 땅속에서 기운만 바뀌는 '씨앗의 시작', 인(寅)월은 싹이 땅 위로 나오는 '현실의 시작'입니다.</div>
<div class="ins"><strong>득령(得令)이란?</strong> 일간이 태어난 계절(월지)로부터 힘을 받는 상태.<br>
· <strong>득령</strong> → 자신감·추진력·체력이 강함<br>
· <strong>실령</strong> → 환경의 영향을 더 받음, 유연하고 협력을 잘함<br>
득령이 없다고 나쁜 사주가 아닙니다. 실령 사주는 타인과의 조화가 뛰어납니다.</div>
<table>
<thead><tr><th>월지</th><th>계절</th><th>오행</th><th>辛金 득령 여부</th><th>이유</th></tr></thead>
<tbody>
<tr><td>寅·卯 (봄)</td><td>봄</td><td>木</td><td>실령</td><td>金剋木 → 힘 소모</td></tr>
<tr><td>辰 (환절기)</td><td>환절기</td><td>土</td><td>보통</td><td>土生金, 약한 도움</td></tr>
<tr><td>巳·午 (여름)</td><td>여름</td><td>火</td><td>실령</td><td>火克金, 가장 힘든 계절</td></tr>
<tr><td>未 (환절기)</td><td>환절기</td><td>土</td><td>보통</td><td>土生金, 약한 도움</td></tr>

let cur = 0;

function renderNav() {
  const nav = document.getElementById('snav');
  nav.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= cur ? ' done' : '');
      nav.appendChild(line);
    }
    const dot = document.createElement('div');
    const isB = s.isBreak;
    dot.className = 'step-dot' + (isB ? ' break-dot' : '') + (i === cur ? ' active' : i < cur ? ' done' : '');
    dot.textContent = isB ? '☕' : (i < 2 ? i + 1 : i === 2 ? '✦' : i);
    dot.title = s.title;
    dot.onclick = () => go(i);
    nav.appendChild(dot);
  });
  document.getElementById('pbar').style.width = ((cur + 1) / STEPS.length * 100) + '%';
}

function renderPanel() {
  const s = STEPS[cur];
  const tagMap = { basic: ['기초', 'tag-basic'], mid: ['중급', 'tag-mid'], adv: ['심화', 'tag-adv'], brk: ['쉬어가기', 'tag-brk'] };
  const [tl, tc] = tagMap[s.tag];
  const numLabel = s.isBreak ? '☕' : (cur < 2 ? cur + 1 : cur === 2 ? '✦' : cur);
  const nc = s.isBreak ? 'panel-num brk' : 'panel-num';
  document.getElementById('panel').innerHTML = `
    <div class="panel-header">
      <div class="${nc}">${numLabel}</div>
      <div>
        <div class="panel-title">${s.title} <span class="tag ${tc}">${tl}</span></div>
        <div class="panel-sub">${s.sub}</div>
      </div>
    </div>
    <div>${s.html}</div>
    <div class="nav-row">
      <button class="btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>← 이전</button>
      <button class="btn btn-primary" onclick="go(${cur+1})" ${cur===STEPS.length-1?'disabled':''}>${cur===STEPS.length-1?'완료 ✓':'다음 단계 →'}</button>
    </div>`;

  document.querySelectorAll('.pillar').forEach(p => p.classList.remove('active', 'active2'));
  s.focus.forEach(i => {
    const p = document.querySelector(`.pillar[data-idx="${i}"]`);
    if (p) p.classList.add(i === 2 ? 'active' : 'active2');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(i) {
  if (i < 0 || i >= STEPS.length) return;
  cur = i;
  renderNav();
  renderPanel();
}
function selP(i) {
  const m = { 2: 0, 1: 1, 0: 5, 3: 4 };
  go(m[i] ?? 0);
}

go(0);
</script>
